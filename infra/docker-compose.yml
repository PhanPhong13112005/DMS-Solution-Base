version: '3.8'

services:
  # 1. Bưu điện RabbitMQ (Có kèm giao diện web quản lý)
  rabbitmq:
    image: rabbitmq:3-management
    container_name: dms-rabbitmq
    ports:
      - "5672:5672"   # Cổng để các Service kết nối vào gửi/nhận sự kiện
      - "15672:15672" # Cổng để bạn vào web xem quản lý
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  # 2. Database SQL Server (Nếu bạn muốn chạy DB trên Docker luôn cho sạch máy)
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: dms-sqlserver
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: Y
      SA_PASSWORD: "PhanPhong" # Thay đổi pass nếu cần