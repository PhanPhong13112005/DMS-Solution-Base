version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: dms-sqlserver-prod
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=PhanPhong@123
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "PhanPhong@123", "-Q", "SELECT 1", "-No"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dms-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: dms-rabbitmq-prod
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dms-network

  room-service:
    build: 
      context: .
      dockerfile: backend/services/RoomBuildingService/Dockerfile
    container_name: dms-room-service
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=RoomDB;User Id=sa;Password=PhanPhong@123;TrustServerCertificate=True;MultipleActiveResultSets=true
      - RabbitMQ__Host=rabbitmq
    ports:
      - "8083:8083"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - dms-network

  student-service:
    build:
      context: .
      dockerfile: backend/services/StudentContractService/Dockerfile
    container_name: dms-student-service
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=StudentContractDb;User Id=sa;Password=PhanPhong@123;TrustServerCertificate=True;
      - RabbitMQ__Host=rabbitmq
    ports:
      - "8081:8081"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - dms-network

  billing-service:
    build:
      context: .
      dockerfile: backend/services/BillingMaintenanceService/Dockerfile
    container_name: dms-billing-service
    environment:
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=BillingMaintenanceDB;User Id=sa;Password=PhanPhong@123;TrustServerCertificate=True;
      - RabbitMQ__Host=rabbitmq
    ports:
      - "8082:8082"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - dms-network

  gateway:
    build:
      context: .
      dockerfile: backend/services/Gateway/Dockerfile
    container_name: dms-gateway
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
    ports:
      - "5000:5000"
    depends_on:
      - room-service
      - student-service
      - billing-service
    networks:
      - dms-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dms-frontend
    ports:
      - "80:80"
    depends_on:
      - gateway
    networks:
      - dms-network

networks:
  dms-network:
    driver: bridge

volumes:
  sqlserver_data:
